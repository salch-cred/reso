<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reso — 3D Motion Presentation</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/uncut-sans@latest/400.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/uncut-sans@latest/700.css"/>
<link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css"/>
<style>
  :root {
    --bg: #020b14;
    --accent: #0EA5E9;
    --accent2: #38BDF8;
    --text: #f0f9ff;
    --font: 'Uncut Sans', sans-serif;
  }
  
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #canvas-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  /* Overlay HUD */
  .hud {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 40px;
    z-index: 10;
    pointer-events: none;
    box-sizing: border-box;
  }

  .hud-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    box-shadow: 0 0 15px rgba(14, 165, 233, 0.4);
  }
  .brand span {
    font-weight: 700;
    font-size: 1.2rem;
    letter-spacing: -0.02em;
  }

  .hud-center {
    text-align: center;
    max-width: 700px;
    margin: 0 auto;
  }
  .title-text {
    font-size: 2.5rem;
    font-weight: 800;
    line-height: 1.2;
    letter-spacing: -0.03em;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    text-shadow: 0 0 40px rgba(14, 165, 233, 0.3);
  }
  .title-text.active {
    opacity: 1;
    transform: translateY(0);
  }

  .hud-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .time-indicator {
    font-size: 0.9rem;
    color: var(--accent2);
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  /* Buttons overlay - clickable */
  .controls {
    position: absolute;
    bottom: 40px;
    right: 40px;
    z-index: 20;
    display: flex;
    gap: 12px;
  }
  .btn {
    background: rgba(14, 165, 233, 0.15);
    border: 1px solid rgba(14, 165, 233, 0.3);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.9rem;
    backdrop-filter: blur(8px);
    transition: background 0.2s, border-color 0.2s;
  }
  .btn:hover {
    background: rgba(14, 165, 233, 0.35);
    border-color: var(--accent);
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div class="hud">
  <div class="hud-top">
    <div class="brand">
      <img src="logo.png" alt="Logo">
      <span>Reso 3D Presentation</span>
    </div>
  </div>
  <div class="hud-center">
    <div id="slide0" class="title-text active">Cryptographic Compliance settled natively on Stellar</div>
    <div id="slide1" class="title-text">Prove compliance. Never expose your balances or key details</div>
    <div id="slide2" class="title-text">Additive Homomorphic Limit Verification via Paillier ZK</div>
    <div id="slide3" class="title-text">Reso — Zero-Knowledge Compliance settled.</div>
  </div>
  <div class="hud-bottom">
    <div class="time-indicator" id="timer">00:00 / 00:30</div>
  </div>
</div>

<div class="controls">
  <button class="btn" onclick="restartVideo()"><i class="hgi-stroke hgi-refresh"></i> Replay</button>
  <a href="/" class="btn" style="text-decoration:none"><i class="hgi-stroke hgi-arrow-right-01"></i> Dashboard</a>
</div>

<!-- Load open source Three.js library from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  let scene, camera, renderer;
  let sphereMesh, nodeParticles, ringMeshes = [];
  let startTime = Date.now();
  const duration = 30000; // 30 seconds

  function init3D() {
    const container = document.getElementById('canvas-container');
    
    // Scene setup
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2('#020b14', 0.015);

    // Camera setup
    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 8;

    // Renderer
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(scene.fog.color);
    container.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0x0a1e3f, 1.5);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0x0EA5E9, 2.5, 50);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    // 3D Object 1: Rotating Wireframe Cryptographic Sphere (ZK Accumulator)
    const geom = new THREE.IcosahedronGeometry(2, 2);
    const mat = new THREE.MeshBasicMaterial({
      color: 0x38BDF8,
      wireframe: true,
      transparent: true,
      opacity: 0.4
    });
    sphereMesh = new THREE.Mesh(geom, mat);
    scene.add(sphereMesh);

    // 3D Object 2: Concentric Cryptographic Protection Rings
    for (let i = 0; i < 3; i++) {
      const ringGeom = new THREE.RingGeometry(2.4 + i*0.4, 2.45 + i*0.4, 64);
      const ringMat = new THREE.MeshBasicMaterial({
        color: 0x0EA5E9,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.25 - i*0.05
      });
      const ring = new THREE.Mesh(ringGeom, ringMat);
      ring.rotation.x = Math.random() * Math.PI;
      ring.rotation.y = Math.random() * Math.PI;
      scene.add(ring);
      ringMeshes.push(ring);
    }

    // 3D Object 3: Stellar Network Nodes (Particles)
    const particleCount = 150;
    const particleGeom = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount * 3; i += 3) {
      positions[i] = (Math.random() - 0.5) * 15;
      positions[i+1] = (Math.random() - 0.5) * 15;
      positions[i+2] = (Math.random() - 0.5) * 15;
    }
    particleGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    
    // Circle particle texture
    const pMat = new THREE.PointsMaterial({
      color: 0x38BDF8,
      size: 0.12,
      transparent: true,
      opacity: 0.6
    });
    nodeParticles = new THREE.Points(particleGeom, pMat);
    scene.add(nodeParticles);

    animate();
  }

  function animate() {
    requestAnimationFrame(animate);

    const elapsed = Date.now() - startTime;
    const currentSecond = Math.min(elapsed / 1000, 30);

    // Update timer HUD
    const formattedSec = Math.floor(currentSecond).toString().padStart(2, '0');
    document.getElementById('timer').textContent = `00:${formattedSec} / 00:30`;

    // Rotate geometries
    if (sphereMesh) {
      sphereMesh.rotation.y += 0.003;
      sphereMesh.rotation.x += 0.001;
    }
    
    ringMeshes.forEach((ring, idx) => {
      ring.rotation.z += 0.002 * (idx + 1);
    });

    if (nodeParticles) {
      nodeParticles.rotation.y -= 0.001;
    }

    // Orbit Camera path over time (30s presentation)
    camera.position.x = Math.sin(elapsed * 0.00015) * 8;
    camera.position.z = Math.cos(elapsed * 0.00015) * 8;
    camera.lookAt(0, 0, 0);

    // Toggle slide subtitles
    let activeSlide = 0;
    if (currentSecond >= 22.5) {
      activeSlide = 3;
      // Morph wireframe to be solid/dense
      if (sphereMesh) sphereMesh.material.opacity = 0.85;
    } else if (currentSecond >= 15) {
      activeSlide = 2;
      if (sphereMesh) sphereMesh.material.opacity = 0.45;
    } else if (currentSecond >= 7.5) {
      activeSlide = 1;
    } else {
      activeSlide = 0;
    }

    for (let i = 0; i < 4; i++) {
      const el = document.getElementById(`slide${i}`);
      if (el) {
        if (i === activeSlide) el.classList.add('active');
        else el.classList.remove('active');
      }
    }

    // Reset loop
    if (elapsed >= duration) {
      startTime = Date.now();
    }

    renderer.render(scene, camera);
  }

  function restartVideo() {
    startTime = Date.now();
  }

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  init3D();
</script>
</body>
</html>
